name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Verify installation
      run: |
        git-finder --help
        gf --help
    
    - name: Test with current directory
      run: |
        gf . --list
    
    - name: Run installation test script
      run: |
        python scripts/test_install.py

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        pip install -e .
    
    - name: Check code formatting with Black
      run: |
        black --check git_finder/
    
    - name: Check import sorting with isort
      run: |
        isort --check-only git_finder/
    
    - name: Lint with flake8
      run: |
        flake8 git_finder/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 git_finder/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type check with mypy
      run: |
        mypy git_finder/ --ignore-missing-imports || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit
        pip install -e .
    
    - name: Run Bandit security scan
      run: |
        echo "Running Bandit security scan..."
        bandit -r git_finder/ -f json -o bandit-report.json || true
        bandit -r git_finder/ -ll
      continue-on-error: true
    
    - name: Check dependencies for vulnerabilities with Safety
      run: |
        echo "Checking dependencies with Safety..."
        pip freeze | safety check --stdin --output text || true
      continue-on-error: true
    
    - name: Audit dependencies with pip-audit
      run: |
        echo "Auditing dependencies with pip-audit..."
        pip-audit || true
      continue-on-error: true
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json
        retention-days: 30
      continue-on-error: true
    
    - name: Security scan summary
      if: always()
      run: |
        echo "✅ Security scan completed"
        echo "Check the logs above for any security issues"
        echo "Bandit report uploaded as artifact (if available)"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package with twine
      run: |
        twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/
        retention-days: 7
