name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          dist/*.tar.gz
          dist/*.whl
        body: |
          ## Git Finder v${{ steps.get_version.outputs.VERSION }}

          ### Installation
          ```bash
          pip install git-finder==${{ steps.get_version.outputs.VERSION }}
          ```

          ### What's Changed
          See the [CHANGELOG](CHANGELOG.md) for details.

          ### Quick Start
          ```bash
          gf ~/projects
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Uncomment to publish to PyPI
